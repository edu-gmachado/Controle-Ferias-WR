<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="styles.css?v=7.2"><title>Teste calendário</title></head><body><main class="app-shell"><section class="panel calendar-panel" data-calendar-density="tiny"><div class="calendar-scroll-shell"><div class="calendar-scroll-content"><div class="calendar-weekdays"><span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span></div><div class="calendar-grid" id="grid"></div></div></div></section></main><script>
const names=['Eduardo','Ana','Gabriela Nunes','Alexandre','Maria Fernanda'];
const cells=[];for(let d=1;d<=35;d++){const vac=d%4===0?`<span class="vacation-bands"><span class="vacation-band blue vacation-name-medium"><i class="vacation-group-dot blue"></i><span>${names[d%names.length]}</span></span>${d%8===0?`<span class="vacation-band red vacation-name-long"><i class="vacation-group-dot red"></i><span>Maria Fernanda</span></span>`:''}</span>`:'<span class="vacation-bands empty-bands"></span>';cells.push(`<button class="calendar-day ${d%5===0?'alert':'ok-day'}" style="--day-min-height:${d%8===0?118:90}px"><span class="calendar-day-top"><span class="day-number">${d<=31?d:''}</span><span class="attention-tag ${d%5===0?'alert':'ok'}"><span class="attention-label-full">${d%5===0?'Atenção':'Boa'}</span><span class="attention-label-short">${d%5===0?'Aten.':'Boa'}</span></span></span><span class="calendar-color-strip single-off"><i class="color-segment blue"></i></span><span class="day-colors-label">Folga: Azul</span><span class="day-lines"><span><span class="metric-label"><span class="metric-label-full">Pres.</span><span class="metric-label-short">P</span></span><strong>12</strong></span><span><span class="metric-label"><span class="metric-label-full">Férias</span><span class="metric-label-short">F</span></span><strong>2</strong></span><span><span class="metric-label"><span class="metric-label-full">Folgas</span><span class="metric-label-short">Fg</span></span><strong>3</strong></span></span>${vac}</button>`)}document.getElementById('grid').innerHTML=cells.join('');
</script></body></html>
